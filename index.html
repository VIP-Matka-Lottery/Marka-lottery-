<!DOCTYPE html>
<html>
<head>
    <title>Lottery 1-99</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align: center; background: #f4f4f4; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 10px; }
        .num-btn { padding: 10px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 5px; }
        .selected { background: #28a745; color: white; }
        #payment-area { margin-top: 20px; display: none; padding: 20px; border: 1px solid #ddd; background: #fff; }
        img { width: 200px; height: 200px; }
    </style>
</head>
<body>
    <h2>Apna Number Chuney (1-99)</h2>
    <p>Ticket Price: ₹20</p>
    <div class="grid" id="grid"></div>

    <div id="payment-area">
        <h3>Aapne Number <span id="sel-num"></span> chuna hai</h3>
        <p>Is QR Code par ₹20 pay karein:</p>
        <img src="AAPKA_QR_IMAGE_URL_YAHAN_DAALEIN" alt="Payment QR">
        <br><br>
        <a id="wa-link" href="#" style="background: green; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">Payment Screenshot Bheinjein</a>
    </div>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 99; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'num-btn';
            btn.onclick = function() {
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                showPayment(i);
            };
            grid.appendChild(btn);
        }

        function showPayment(num) {
            document.getElementById('payment-area').style.display = 'block';
            document.getElementById('sel-num').innerText = num;
            // WhatsApp link setup
            let msg = `Hello, maine number ${num} select kiya hai. Ye raha mera payment screenshot.`;
            document.getElementById('wa-link').href = `https://wa.me/91YOUR_NUMBER?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
